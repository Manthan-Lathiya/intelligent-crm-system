{% extends "layout.html" %}
{% block content %}
  <h1 class="text-2xl font-bold">Analytics</h1>
  <p class="text-muted-foreground">Deep dive into your business metrics</p>

    <div class="analytics-grid">

  <div class="chart-card">
    <h3>Revenue vs Expenses</h3>
    <canvas id="revExpChart"></canvas>
  </div>

  <div class="chart-card">
    <h3>Revenue by Client</h3>
    <canvas id="clientChart"></canvas>
  </div>

  <div class="chart-card full-width">
    <h3>Profit Trend</h3>
    <canvas id="profitChart"></canvas>
  </div>

</div>


</div>
<!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
Promise.all([
  fetch("/api/analytics/revenue").then(r=>r.json()),
  fetch("/api/analytics/expenses").then(r=>r.json())
]).then(([rev, exp]) => {
  new Chart(document.getElementById("revExpChart"), {
    type: "bar",
    data: {
      labels: rev.labels,
      datasets: [
        { label:"Revenue", data:rev.values, backgroundColor:"#22c55e" },
        { label:"Expenses", data:exp.values, backgroundColor:"#ef4444" }
      ]
    }
  });
});
</script>

<script>
fetch("/api/analytics/profit")
.then(r=>r.json())
.then(d=>{
  new Chart(document.getElementById("profitChart"), {
    type:"line",
    data:{
      labels:d.labels,
      datasets:[{
        label:"Profit",
        data:d.values,
        borderColor:"#06b6d4",
        tension:0.3
      }]
    }
  });
});
</script>

<script>
fetch("/api/analytics/revenue_by_client")
.then(r=>r.json())
.then(d=>{
  new Chart(document.getElementById("clientChart"), {
    type:"pie",
    data:{
      labels:d.labels,
      datasets:[{
        data:d.values,
        backgroundColor:[
          "#06b6d4","#22c55e","#f59e0b","#3b82f6","#ef4444"
        ]
      }]
    }
  });
});
</script>

</body>
</html>
{% endblock %}
