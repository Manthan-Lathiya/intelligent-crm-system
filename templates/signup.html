<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<div class="flex" style="min-height:100vh;">

<!-- LEFT VISUAL -->
<div class="flex items-center justify-center w-full bg-secondary">
  <div style="text-align:center;">
    <h2 class="text-2xl font-bold">Join 10,000+ Freelancers</h2>
    <p class="text-muted-foreground">
      Start your 14-day free trial. No credit card required.
    </p>
  </div>
</div>

<!-- RIGHT FORM -->
<div class="flex items-center justify-center w-full">

<div style="width:350px;">

<h1 class="text-2xl font-bold m-2">Create Account</h1>
<p class="text-muted-foreground m-2">
Start your free trial
</p>

<form>

<label class="label">Full Name</label>
<input class="input" placeholder="John Doe">

<label class="label">Email</label>
<input class="input" placeholder="john@example.com">

<label class="label">Password</label>
<input 
  type="password"
  id="password"
  class="input"
  onkeyup="checkPassword()"
  placeholder="Enter password"
>

<!-- STRENGTH BAR -->
<div class="progress m-2">
  <div id="strengthBar" class="progress-indicator"></div>
</div>

<!-- REQUIREMENTS -->
<div id="req1" class="text-sm text-muted-foreground">• 8+ characters</div>
<div id="req2" class="text-sm text-muted-foreground">• Uppercase letter</div>
<div id="req3" class="text-sm text-muted-foreground">• Number</div>

<button class="btn btn-primary w-full m-2">
Create Account
</button>

</form>

<p class="text-sm m-2">
Already have account?
<a href="login.html" class="text-primary">Login</a>
</p>

</div>
</div>

</div>

<script>
function checkPassword(){
  let p = document.getElementById("password").value;
  let score = 0;

  if(p.length>=8){ req1.style.color="green"; score++; }
  else{ req1.style.color=""; }

  if(/[A-Z]/.test(p)){ req2.style.color="green"; score++; }
  else{ req2.style.color=""; }

  if(/[0-9]/.test(p)){ req3.style.color="green"; score++; }
  else{ req3.style.color=""; }

  let bar = document.getElementById("strengthBar");
  bar.style.width = (score*33)+"%";

  if(score==1) bar.style.background="red";
  if(score==2) bar.style.background="orange";
  if(score==3) bar.style.background="green";
}
</script>

</body>
</html>
