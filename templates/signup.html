<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  
</head>

<body>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div style="margin: 16px;">
      {% for message in messages %}
        <div class="alert alert-destructive flash-message">
          <span>{{ message }}</span>
          <button class="flash-close" onclick="this.parentElement.remove()">×</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}


<div class="flex" style="min-height:100vh;">

<!-- LEFT VISUAL -->
<div class="flex items-center justify-center w-full bg-secondary">
  <div class="text-center" style="max-width: 300px;">

    <div class="flex items-center gap-2 m-6" style="padding-right: 50px;">
      <div class="avatar-fallback">⚡</div>
      <h2 class="font-bold" style="font-size: large;">FreelanceFlow</h2>
    </div>
    <h2 class="text-2xl font-bold">Join 10,000+ Freelancers</h2>
    <p class="text-muted-foreground">
      Start your 14-day free trial. No credit card required.
    </p>
  </div>
</div>

<!-- RIGHT FORM -->
<div class="flex items-center justify-center w-full">

<div style="width:350px;">

<h1 class="text-2xl font-bold m-2">Create Account</h1>

<form action="/signup" method="post">
<br>
<div class="form-item">
  <label class="label">Full Name</label>
  <input class="input" type="text" name="user_name" placeholder="John Doe">  
</div>

<div class="form-item">
  <label class="label">Email</label>
  <input class="input" type="text" name="user_email" placeholder="john@example.com">
</div>

<div class="form-item">
  <label class="label">Password</label>
  <input 
  type="password"
  id="password"
  class="input"
  name="user_password"
  onkeyup="checkPassword()"
  placeholder="Enter password"
  >
</div>

<button class="btn btn-primary w-full m-2" type="submit">
Create Account
</button>

</form>

<p class="text-sm m-2">
Already have account?
<a href="/login" class="text-primary">Login</a>
</p>

</div>
</div>

</div>

<script>
  
</script>

</body>
</html>
