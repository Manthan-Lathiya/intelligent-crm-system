{% extends "layout.html" %}
{% block content %}

<!-- HEADER -->
<div class="flex justify-between items-center m-4">
  <div>
    <h1 class="text-2xl font-bold">Clients</h1>
    <p class="text-muted-foreground">Manage your client relationships</p>
  </div>

  <button class="btn btn-primary" type="button" onclick="add_client()">+ Add Client</button>
</div>

<!-- SEARCH -->
<div class="m-4">
  <input 
    type="text"
    id="search"
    class="input"
    placeholder="Search clients..."
    onkeyup="searchClients()"
  >
</div>

<!-- CLIENT GRID -->
<div class="flex gap-4 m-4" id="clientGrid">

  {% for c in clients %}
<div class="card p-4 w-full client">
  <div class="flex justify-between">
    <div class="flex gap-3">
      <div class="avatar-fallback">
        {{ c.avatar }}
      </div>
      <div>
        <b>{{ c.name }}</b>
        <p class="text-muted-foreground">{{ c.company_name }}</p>
        <span class="badge badge-primary">{{ c.status }}</span>
      </div>
    </div>
  </div>


  <p class="text-muted-foreground m-2">{{ c.email }}</p>
  <p class="text-muted-foreground">{{ c.phone }}</p>

  <div class="flex justify-between m-2">
    <b>${{ c.total_revenue }}</b>
    <a href="client/{{ c.client_id }}" class="btn btn-ghost">View</a>
  </div>
</div>
{% endfor %}


</div>

<!-- ADD CLIENT MODAL -->
<div id="clientModal" style="display:none;">

  <div class="dialog-overlay" onclick="closeClientModal()"></div>

  <div class="dialog-content animate-in">

    <h2 class="text-xl font-bold m-2">Add Client</h2>

    <form id="clientForm" onsubmit="saveClient(event)">

      <div class="form-item">
        <label class="label">Client Name</label>
        <input class="input" id="client_name" required>
      </div>

      <div class="form-item">
        <label class="label">Email</label>
        <input type="email" class="input" id="client_email" required>
      </div>

      <div class="form-item">
        <label class="label">Phone</label>
        <input class="input" id="client_phone" required>
      </div>

      <div class="form-item">
        <label class="label">Company Name</label>
        <input class="input" id="company_name">
      </div>

      <div class="form-item">
        <label class="label">Status</label>
        <select class="input" id="status">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>

      <div class="form-item">
        <label class="label">Total Revenue</label>
        <input type="number" class="input" id="total_revenue" value="0">
      </div>

      <div class="flex justify-between gap-3 m-2">
        <button type="button" class="btn btn-outline" onclick="closeClientModal()">Cancel</button>
        <button class="btn btn-primary">Save Client</button>
      </div>

    </form>

  </div>
</div>


<script>
  function add_client(){
    document.getElementById("clientModal").style.display = "block";
  }

  function closeClientModal(){
    document.getElementById("clientModal").style.display = "none";
  }

  function saveClient(e){
  e.preventDefault();

  fetch("/add_client", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("client_name").value,
      email: document.getElementById("client_email").value,
      phone: document.getElementById("client_phone").value,
      company: document.getElementById("company_name").value,
      status: document.getElementById("status").value,
      revenue: document.getElementById("total_revenue").value
    })

  })
  .then(res => res.json())
  .then(data => {
    if(data.success){
      alert("Client saved successfully");
      closeClientModal();
      location.reload(); 
    }
  });
}
  function searchClients(){
    let input = document.getElementById("search").value.toLowerCase();
    let clients = document.querySelectorAll(".client");

    clients.forEach(c=>{
      let name = c.dataset.name;
      let email = c.dataset.email;

      if(name.includes(input) || email.includes(input)){
        c.style.display="block";
      } else {
        c.style.display="none";
      }
    });
}
</script>

</body>
</html>
{% endblock %}
